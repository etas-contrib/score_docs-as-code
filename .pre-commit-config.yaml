repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-json
        exclude: ^\.vscode/ # those are actually jsonc files
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=150"]

  - repo: local
    hooks:
      - id: bazel-mod-tidy
        name: format Bazel module files
        entry: bazel mod tidy
        language: system
        pass_filenames: false
        files: '(^|/)(MODULE\.bazel|.*\.bzl|BUILD(\.bazel)?)$'
      - id: actionlint
        name: actionlint
        # Disable shellcheck and pyflakes for now, to enforce consistent behavior.
        entry: tools/run_tool.sh actionlint -shellcheck= -pyflakes=
        language: system
        require_serial: true
        types: [yaml]
        files: ^\.github/workflows/
      - id: ruff-check
        name: ruff-check
        entry: tools/run_tool.sh ruff check --fix
        language: system
        require_serial: true
        types: [python]
      - id: ruff-format
        name: ruff-format
        entry: tools/run_tool.sh ruff format
        language: system
        require_serial: true
        types: [python]

  # Note: this is super slow, therefore it is last
  - repo: local
    hooks:
      - id: BasedPyright
        name: BasedPyright
        entry: bash -c 'bazel run //:ide_support && .venv_docs/bin/python3 -m basedpyright'
        language: system
        pass_filenames: false

  # Ensure every file has a copyright header as per the Eclipse Foundation's requirements
  - repo: https://github.com/eclipse-score/tooling
    rev: 31ff8eee214e4e97ef8f5cb46e443273515b63ec
    hooks:
      - id: copyright
